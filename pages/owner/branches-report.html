<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير الفروع - المالك | نظام MO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    
    <style>
        .branch-stock-card {
            border-right: 4px solid var(--secondary-color);
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        .branch-stock-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .branch-stock-card .branch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #f8f5f2;
            border-radius: 8px 8px 0 0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .branch-stock-card .branch-stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .branch-stock-card .branch-stats .stat {
            font-size: 14px;
        }
        .branch-stock-card .branch-stats .stat .number {
            font-weight: 700;
            color: var(--primary-color);
        }
        .branch-products {
            padding: 15px 20px;
        }
        .branch-products .product-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #f0ece8;
            font-size: 14px;
        }
        .branch-products .product-item:hover {
            background: #f8f5f2;
        }
        .branch-products .product-item .name {
            font-weight: 500;
        }
        .branch-products .product-item .qty {
            font-weight: 700;
            color: var(--primary-color);
        }
        .btn-view-products {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-view-products:hover {
            background: #5C1212;
            transform: scale(1.05);
        }
        .products-collapse {
            display: none;
        }
        .products-collapse.show {
            display: block;
        }
        .badge-low {
            background: #ffc107;
            color: #000;
        }
        .badge-out {
            background: #dc3545;
            color: #fff;
        }
        .badge-ok {
            background: #28a745;
            color: #fff;
        }
        .btn-sm-custom {
            padding: 5px 12px;
            font-size: 13px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="brand">
            <h2>MO<span>.</span></h2>
            <small>نظام إدارة المحلات</small>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item">
                <a class="nav-link" href="dashboard.html">
                    <i class="fas fa-chart-pie"></i> لوحة التحكم
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="branches-report.html">
                    <i class="fas fa-store"></i> تقارير الفروع
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="sales-report.html">
                    <i class="fas fa-chart-line"></i> تقارير المبيعات
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="stock-report.html">
                    <i class="fas fa-boxes"></i> تقارير المخزون
                </a>
            </li>
            <li class="nav-item mt-4">
                <a class="nav-link text-danger" href="#" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <button class="hamburger-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h4 class="mb-1" style="color: var(--primary-color);">
                    <i class="fas fa-store"></i> تقارير الفروع
                </h4>
                <small class="text-muted">عرض تقارير جميع الفروع مع المنتجات والمخزون والمبيعات</small>
            </div>
        </div>

        <!-- عرض الفروع -->
        <div id="branchesContainer">
            <div class="text-center text-muted py-5">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p class="mt-2">جاري تحميل بيانات الفروع...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/owner/branches-report.js"></script>
</body>
</html>
