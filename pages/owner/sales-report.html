<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقارير المبيعات - المالك | نظام MO</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <nav class="sidebar" id="sidebar">
        <div class="brand">
            <h2>MO<span>.</span></h2>
            <small>نظام إدارة المحلات</small>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item">
                <a class="nav-link" href="dashboard.html">
                    <i class="fas fa-chart-pie"></i> لوحة التحكم
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="branches-report.html">
                    <i class="fas fa-store"></i> تقارير الفروع
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="sales-report.html">
                    <i class="fas fa-chart-line"></i> تقارير المبيعات
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="stock-report.html">
                    <i class="fas fa-boxes"></i> تقارير المخزون
                </a>
            </li>
            <li class="nav-item mt-4">
                <a class="nav-link text-danger" href="#" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <button class="hamburger-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h4 class="mb-1" style="color: var(--primary-color);">
                    <i class="fas fa-chart-line"></i> تقارير المبيعات
                </h4>
                <small class="text-muted">عرض تقارير المبيعات حسب الفترة والفروع</small>
            </div>
        </div>

        <!-- الفلاتر -->
        <div class="filter-section">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label form-label-custom">من تاريخ</label>
                    <input type="date" class="form-control form-control-custom" id="filterDateFrom">
                </div>
                <div class="col-md-3">
                    <label class="form-label form-label-custom">إلى تاريخ</label>
                    <input type="date" class="form-control form-control-custom" id="filterDateTo">
                </div>
                <div class="col-md-3">
                    <label class="form-label form-label-custom">الفرع</label>
                    <select class="form-control form-control-custom" id="filterBranch">
                        <option value="all">جميع الفروع</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-secondary-custom w-100 mt-4" onclick="applyFilters()">
                        <i class="fas fa-filter"></i> تطبيق الفلتر
                    </button>
                </div>
            </div>
        </div>

        <!-- إحصائيات -->
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalSales">0</div>
                    <div class="stat-label">إجمالي المبيعات</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalItems">0</div>
                    <div class="stat-label">إجمالي القطع</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="avgPerDay">0</div>
                    <div class="stat-label">المتوسط اليومي</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="topProduct">-</div>
                    <div class="stat-label">أفضل منتج</div>
                </div>
            </div>
        </div>

        <!-- مخطط المبيعات -->
        <div class="chart-container">
            <h6 class="mb-3"><i class="fas fa-chart-bar"></i> مبيعات الفروع</h6>
            <canvas id="salesChart"></canvas>
        </div>

        <!-- جدول المبيعات -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-custom mb-0">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الفرع</th>
                                <th>المنتج</th>
                                <th>الكمية</th>
                                <th>التاريخ</th>
                                <th>الحالة</th>
                            </tr>
                        </thead>
                        <tbody id="salesTable">
                            <tr>
                                <td colspan="6" class="text-center text-muted">جاري التحميل...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="../../assets/js/auth.js"></script>
    <script src="../../assets/js/owner/sales-report.js"></script>
</body>
</html>
